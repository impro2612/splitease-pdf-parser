services:
  - type: web
    name: splitease-pdf-parser
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: ALLOWED_ORIGIN
        value: https://splitease.vercel.app
